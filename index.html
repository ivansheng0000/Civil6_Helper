<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>District Discount Calculators</title>
  <link rel="stylesheet" href="styles/condition-1.css">
  <link rel="stylesheet" href="styles/condition-2.css">
  <link rel="stylesheet" href="styles/basic-mechanics.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <p>Disctrict Discount Calculators</p>
  <div class="basic-mechanics">
    <div class="condition-1">
      <div class="number-box">
        <p>Built</p>
        <button onclick="increase('built')">▲</button>
        <input id="built" type="text" value="0">
        <button onclick="decrease('built')">▼</button>
      </div>
      <div class="greater-equal">
        <p>&ge;</p>
      </div>
      <div class="number-box">
        <p>Unlock</p>
        <button onclick="increase('unlock')">▲</button>
        <input id="unlock" type="text" value="0">
        <button onclick="decrease('unlock')">▼</button>
      </div>
    </div>

    <div class="condition-2">
      <div class="number-box">
        <p>existing</p>
        <button onclick="increase('existing')">▲</button>
        <input id="existing" type="text" value="0">
        <button onclick="decrease('existing')">▼</button>
      </div>
      <div class="less-than">
        <p>&le;</p>
      </div>
      <div class="built-over-unlock">
        <p id="fraction">\( \frac{0}{0} \)</p>
      </div>
    </div>
    
    <div>

    </div>
  </div>
  <script>
    let calculator = {
      built: 0, 
      unlock: 0, 
      existing: {
        campus: 0, 
        holy_site: 0,
        comm_hub: 0, 
        encampment: 0, 
        gov_plaza: 0,
        habor: 0,
        entertainment: 0,
        industrial_zone: 0,
        theater_square: 0,
        water_park: 0,
        preserve: 0,
      }
    }
    function add(object, key){

    }
    function increase(str) {
      let input = document.getElementById(str);
      input.value = parseInt(input.value) + 1;
      updateFraction();
    }

    function decrease(str) {
      let input = document.getElementById(str);
      input.value = parseInt(input.value) - 1;
      updateFraction();
    }

    function updateFraction() {
      let built = document.getElementById("built").value;
      let unlock = document.getElementById("unlock").value;

      let fraction = document.getElementById("fraction");

      fraction.innerHTML = `\\( \\frac{${built}}{${unlock}} \\)`;

      MathJax.typeset();
    }
  </script>  
</body>
</html>
